<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>gallery</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(to right, #caf0f8, #ade8f4);
        }

        header {
            background: #0077b6;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #023e8a;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #90e0ef;
        }

        .container {
            padding: 30px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        footer {
            background: #0077b6;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>

</head>
<body>

<header>
    <h1>Galeri Saya</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="biodata.html">Biodata</a>
    <a href="galeri.html">Galeri</a>
    <a href="video.html">Video</a>
</nav>

<div class="container">
    <h2>Kumpulan Foto</h2>

    <div class="gallery">
        <img src="1.jpg" alt="Foto 1">
        <img src="2.jpg" alt="Foto 2">
        <img src="3.jpg" alt="Foto 3">
        <img src="4.jpg" alt="Foto 4">
        <img src="5.jpg" alt="Foto 5">
        <img src="6.jpg" alt="Foto 6">
    </div>
</div>

<footer>
    <p>© 2026 Website Saya</p>
</footer>

</body>
</html>
