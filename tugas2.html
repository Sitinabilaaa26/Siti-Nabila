<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Formulir Data Demografi</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .form-container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .input-group {
        margin-bottom: 15px;
    }

    label {
        font-size: 14px;
        display: block;
        margin-bottom: 5px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
    }

    input:focus, select:focus {
        border-color: #2575fc;
        box-shadow: 0 0 5px rgba(37,117,252,0.5);
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        background: #2575fc;
        color: white;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #1a5ed8;
    }

    .step {
        display: none;
    }

    .step.active {
        display: block;
    }

</style>
</head>
<body>

<div class="form-container">
    <form id="multiStepForm">

        <!-- STEP 1 -->
        <div class="step active">
            <h2>Data Pribadi</h2>

            <div class="input-group">
                <label>Nama Lengkap</label>
                <input type="text" required>
            </div>

            <div class="input-group">
                <label>Tanggal Lahir</label>
                <input type="date" required>
            </div>

            <div class="input-group">
                <label>Alamat</label>
                <input type="text" required>
            </div>

            <button type="button" onclick="nextStep()">Next ➜</button>
        </div>

        <!-- STEP 2 -->
        <div class="step">
            <h2>Kontak & Pendidikan</h2>

            <div class="input-group">
                <label>No Telepon</label>
                <input type="tel" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" required>
            </div>

            <div class="input-group">
                <label>Pendidikan</label>
                <select required>
                    <option value="">-- Pilih Pendidikan --</option>
                    <option>SD</option>
                    <option>SMP</option>
                    <option>SMA/SMK</option>
                    <option>Diploma</option>
                    <option>S1</option>
                    <option>S2</option>
                    <option>S3</option>
                </select>
            </div>

            <button type="button" onclick="prevStep()">⬅ Back</button>
            <button type="submit">Submit</button>
        </div>

    </form>
</div>

<script>
let currentStep = 0;
const steps = document.querySelectorAll(".step");

function showStep(index) {
    steps.forEach((step, i) => {
        step.classList.remove("active");
        if (i === index) step.classList.add("active");
    });
}

function nextStep() {
    currentStep++;
    showStep(currentStep);
}

function prevStep() {
    currentStep--;
    showStep(currentStep);
}
</script>

</body>
</html>
